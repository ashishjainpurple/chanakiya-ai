<!DOCTYPE html>
<html>
<head>
  <title>🪔 Chanakiya Dharma AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      text-align:center;
      color:white;
      overflow:hidden;
      background:
        radial-gradient(circle at top,#ffd700 0%,transparent 25%),
        linear-gradient(160deg,#4b0000,#120018,#000);
      padding:20px;
    }

    .box{
      max-width:550px;
      margin:auto;
      background:rgba(0,0,0,0.55);
      padding:25px;
      border-radius:25px;
      box-shadow:0 0 30px gold;
      position:relative;
      z-index:2;
    }

    h1{ color:gold; }

    textarea{
      width:90%;
      height:90px;
      border:none;
      border-radius:15px;
      padding:12px;
      font-size:17px;
    }

    button{
      padding:15px 25px;
      margin:10px;
      border:none;
      border-radius:30px;
      background:gold;
      color:#4b0000;
      font-size:18px;
      font-weight:bold;
    }

    #answer{
      margin-top:20px;
      font-size:20px;
      line-height:1.6;
      color:#ffeaa7;
      white-space:pre-wrap;
    }

    .flower{
      position:fixed;
      top:-20px;
      font-size:20px;
      animation:fall linear infinite;
      opacity:0.8;
      z-index:1;
    }

    @keyframes fall{
      0%{ transform:translateY(-10vh) rotate(0deg); }
      100%{ transform:translateY(110vh) rotate(360deg); }
    }
  </style>
</head>

<body onload="playBell()">

<div class="box">
  <h1>🪔 Chanakiya Dharma AI</h1>

  <p>Ask about Dharma, Karma, Krishna, Hanuman, Gita</p>

  <textarea id="question" placeholder="Ask your Dharma question..."></textarea>

  <br>

  <button onclick="playBell(); startVoice();">🔔 🎤 Speak</button>

  <button onclick="playBell(); askAI();">Ask Chanakiya</button>

  <div id="answer">Welcome to Chanakiya Dharma AI</div>
</div>

<script>
const WORKER_URL = "https://chanakiya.ashishjain-purple.workers.dev/";

function playBell(){
  const bell = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");
  bell.volume = 1;
  bell.play().catch(()=>{});
}

async function askAI(){
  const q = document.getElementById("question").value.trim();
  const ans = document.getElementById("answer");

  if(!q){
    ans.innerText = "Please ask a Dharma question.";
    return;
  }

  ans.innerText = "Chanakiya is thinking...";

  try{
    const response = await fetch(WORKER_URL, {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        question:q
      })
    });

    const data = await response.json();

    const reply = data.answer || "No answer received.";

    ans.innerText = reply;

    speak(reply);

  }catch(err){
    ans.innerText = "Connection Error:\n" + err.message;
  }
}

function speak(text){
  speechSynthesis.cancel();

  const s = new SpeechSynthesisUtterance(text);
  s.lang = "hi-IN";
  s.rate = 0.9;

  speechSynthesis.speak(s);
}

function startVoice(){
  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Use Chrome browser.");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "hi-IN";
  rec.start();

  rec.onresult = function(e){
    document.getElementById("question").value =
      e.results[0][0].transcript;

    askAI();
  };
}

for(let i=0;i<25;i++){
  const f = document.createElement("div");

  f.className = "flower";
  f.innerHTML = "🌸";
  f.style.left = Math.random()*100 + "vw";
  f.style.animationDuration = (5 + Math.random()*5) + "s";
  f.style.fontSize = (15 + Math.random()*20) + "px";

  document.body.appendChild(f);
}
</script>

</body>
</html>

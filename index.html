<!DOCTYPE html>
<html>
<head>
  <title>🪔 Dharma AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      text-align:center;
      color:white;
      overflow:hidden;
      background:
        radial-gradient(circle at top,#ffd700 0%,transparent 25%),
        linear-gradient(160deg,#4b0000,#120018,#000);
      padding:20px;
    }

    .box{
      max-width:550px;
      margin:auto;
      background:rgba(0,0,0,0.55);
      padding:25px;
      border-radius:25px;
      box-shadow:0 0 30px gold;
      position:relative;
      z-index:2;
      margin-top:40px;
    }

    h1{
      color:gold;
      font-size:52px;
    }

    p{
      font-size:22px;
    }

    textarea{
      width:90%;
      height:100px;
      border:none;
      border-radius:15px;
      padding:12px;
      font-size:20px;
    }

    button{
      padding:16px 28px;
      margin:12px;
      border:none;
      border-radius:35px;
      background:gold;
      color:#4b0000;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;
    }

    #answer{
      margin-top:25px;
      font-size:24px;
      line-height:1.7;
      color:#ffeaa7;
      white-space:pre-wrap;
    }

    .flower{
      position:fixed;
      top:-20px;
      font-size:20px;
      animation:fall linear infinite;
      opacity:0.8;
      z-index:1;
    }

    @keyframes fall{
      0%{ transform:translateY(-10vh) rotate(0deg); }
      100%{ transform:translateY(110vh) rotate(360deg); }
    }
  </style>
</head>

<body onload="playBell()">

<div class="box">
  <h1>🪔 Dharma AI</h1>

  <p>Ask about Dharma, Karma, Krishna, Hanuman, Gita</p>

  <textarea id="question" placeholder="Ask your Dharma question..."></textarea>

  <br>

  <button onclick="playBell(); startVoice();">🔔 🎤 Speak</button>

  <button onclick="playBell(); askAI();">Ask Dharma AI</button>

  <div id="answer">Welcome to Dharma AI</div>
</div>

<script>
const WORKER_URL =
"https://script.google.com/macros/s/AKfycbwRbyCdAji6n7Z8km_DMJxm95M_BZ6PImXKqgD3EOB9ptmMRogcUxsTUly_XvkPE_1w/exec";

function playBell(){
  const bell = new Audio("https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3");
  bell.volume = 1;
  bell.play().catch(()=>{});
}

function askAI(){
  const q = document.getElementById("question").value.trim();
  const ans = document.getElementById("answer");

  if(!q){
    ans.innerText = "Please ask a Dharma question.";
    return;
  }

  ans.innerText = "Dharma AI is thinking...";

  const oldScript = document.getElementById("jsonpScript");
  if(oldScript){
    oldScript.remove();
  }

  const script = document.createElement("script");
  script.id = "jsonpScript";
  script.src =
    WORKER_URL +
    "?q=" +
    encodeURIComponent(q) +
    "&callback=handleAIResponse";

  document.body.appendChild(script);
}

function handleAIResponse(data){
  const reply = data.answer || "No answer received.";
  document.getElementById("answer").innerText = reply;
  speak(reply);
}

function speak(text){
  speechSynthesis.cancel();

  const s = new SpeechSynthesisUtterance(text);
  s.lang = "hi-IN";
  s.rate = 0.9;

  speechSynthesis.speak(s);
}

function startVoice(){
  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Use Chrome browser.");
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = "hi-IN";
  rec.start();

  rec.onresult = function(e){
    document.getElementById("question").value =
      e.results[0][0].transcript;

    askAI();
  };
}

for(let i=0;i<30;i++){
  const f = document.createElement("div");

  f.className = "flower";
  f.innerHTML = "🌸";
  f.style.left = Math.random()*100 + "vw";
  f.style.animationDuration = (5 + Math.random()*5) + "s";
  f.style.fontSize = (15 + Math.random()*20) + "px";

  document.body.appendChild(f);
}
</script>

</body>
</html>
